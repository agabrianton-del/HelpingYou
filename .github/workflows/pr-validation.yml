name: PR Validation & Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  validate-pr:
    name: Validate PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            fix
            feat
            docs
            style
            refactor
            perf
            test
            chore
            ci
            revert
          requireScope: true

      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const additions = pr.additions;
            const deletions = pr.deletions;
            const changedFiles = pr.changed_files;

            const MAX_ADDITIONS = 500;
            const MAX_DELETIONS = 500;
            const MAX_FILES = 30;

            let messages = [];

            if (additions > MAX_ADDITIONS) {
              messages.push(`⚠️ Large addition count: ${additions} lines (max: ${MAX_ADDITIONS})`);
            }

            if (deletions > MAX_DELETIONS) {
              messages.push(`⚠️ Large deletion count: ${deletions} lines (max: ${MAX_DELETIONS})`);
            }

            if (changedFiles > MAX_FILES) {
              messages.push(`⚠️ Many files changed: ${changedFiles} files (max: ${MAX_FILES})`);
            }

            if (messages.length > 0) {
              github.rest.issues.createComment({
                issue_number: pr.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: messages.join('\n') + '\n\n💡 Consider breaking this PR into smaller, more focused changes.'
              });
            }

  label-pr:
    name: Auto-label PR
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    steps:
      - name: Add labels based on title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const labels = [];

            if (title.includes('fix:') || title.includes('bugfix')) {
              labels.push('bug');
            }
            if (title.includes('feat:') || title.includes('feature')) {
              labels.push('enhancement');
            }
            if (title.includes('docs:')) {
              labels.push('documentation');
            }
            if (title.includes('refactor:')) {
              labels.push('refactoring');
            }
            if (title.includes('test:')) {
              labels.push('testing');
            }
            if (title.includes('chore:') || title.includes('ci:')) {
              labels.push('maintenance');
            }

            if (labels.length > 0) {
              github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: labels
              });
            }

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v3
        with:
          fail-on-severity: moderate
          allow-licenses: Apache-2.0,MIT,BSD-3-Clause,BSD-2-Clause,ISC

  spell-check:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run spell check
        uses: crate-ci/typos@master
        with:
          files: .
          exclude: |
            .git
            .github
            node_modules
            dist
            build
            coverage

  commit-lint:
    name: Lint Commit Messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        uses: wagoid/commitlint-github-action@v5
        with:
          configFile: commitlint.config.js

  security-review:
    name: Security Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  pr-summary:
    name: Generate PR Summary
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    steps:
      - name: Create PR summary
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            
            const summary = `
## 📋 PR Summary

- **Author:** @${pr.user.login}
- **Base:** \`${pr.base.ref}\`
- **Head:** \`${pr.head.ref}\`
- **Changed Files:** ${pr.changed_files}
- **Additions:** +${pr.additions}
- **Deletions:** -${pr.deletions}

## ✅ Checklist

- [ ] Code follows style guidelines
- [ ] Self-review completed
- [ ] Comments added for complex logic
- [ ] No new warnings generated
- [ ] Tests added/updated
- [ ] Documentation updated
- [ ] No breaking changes
            `;
            
            github.rest.issues.createComment({
              issue_number: pr.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
